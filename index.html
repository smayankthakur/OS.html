                                                        <span className="px-2 py-1 rounded bg-primary/10 text-primary text-[10px] font-bold uppercase">{task.sku}</span>
                                                        <span className={`px-2 py-1 rounded bg-${task.prioCol}-100 text-${task.prioCol}-700 text-[10px] font-bold uppercase`}>{task.prio}</span>
                                                    </div>
                                                    <h4 className={`font-semibold text-base mb-4 leading-snug group-hover:text-primary transition-colors ${col.title === 'Done' ? 'line-through decoration-slate-400 opacity-60' : ''}`}>{task.title}</h4>
                                                    <div className="flex items-center justify-between">
                                                        <div className="flex items-center gap-2 text-slate-500 text-xs">
                                                            <span className="material-symbols-outlined text-lg">calendar_today</span>
                                                            <span>{task.date}</span>
                                                        </div>
                                                        <div className="size-7 rounded-full overflow-hidden border-2 border-white">
                                                            <img src={task.img} className="w-full h-full object-cover" alt="user" />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <MemoryRouter>
                    <Routes>
                        <Route path="/" element={<DashboardPage />} />
                        <Route path="/inventory" element={<InventoryPage />} />
                        <Route path="/inventory/detail" element={<ProductDetailPage />} />
                        <Route path="/competitors" element={<CompetitorPage />} />
                        <Route path="/tasks" element={<TasksPage />} />
                        {/* Fallbacks */}
                        <Route path="*" element={<DashboardPage />} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
